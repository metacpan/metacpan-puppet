---
classes:
    - metacpan_postgres
    - minion_queue

minion_queue::service::workers: 5
minion_queue::service::ensure: stopped
minion_queue::service::enable: true

# We want watcher enabled
metacpan::watcher::enable: true

metacpan::crons::api:
    snapshot_cpan_index:
      ensure : absent
    snapshot_user_index:
      ensure : absent
    snapshot_purge_old:
      ensure : absent
    author:
      ensure : absent
    ratings:
      ensure : absent
    cpantesters:
      ensure : absent
    latest:
      ensure : absent
    backup_purge:
      ensure : absent
    session:
      ensure : absent
    release:
      ensure : absent
    package:
      ensure : absent
    package_cleanup:
      ensure : absent
    permission:
      ensure : absent
    permission_cleanup:
      ensure : absent
    tickets:
      ensure : absent
    river:
      ensure : absent
    external_cygwin:
      ensure : absent
    external_debian:
      ensure : absent
    contributor_daily:
      ensure : absent
    contributor_weekly:
      ensure : absent
    favorite_hourly:
      ensure : absent
    favorite_weekly:
      ensure : absent
    cover_full:
      ensure : absent
